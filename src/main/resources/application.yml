spring:
  application:
    name: tasker_db

  datasource:
    url: jdbc:mysql://localhost:3306/tasker_db
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${LDB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  liquibase:
    enabled: false
