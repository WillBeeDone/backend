spring:
  application:
    name: WillBeeDone

#  datasource:
#    url: jdbc:mysql://localhost:3306/willbeedone
#    driver-class-name: com.mysql.cj.jdbc.Driver
#    username: root
#    password: sql77777

  datasource:
    url: ${LDB_DATABASE}//${LDB_HOST}:${LDB_PORT}/${LDB_NAME}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${LDB_USERNAME}
    password: ${LDB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: false

  mail:
    username: ${MAIL_FROM}
    password: ${MAIL_FROM_PASSWORD}
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            protocols: TLSv1.2
            trust: smtp.gmail.com

key:
  access: ${ACCESS_PHRASE_SECRET}
  refresh: ${REFRESH_PHRASE_SECRET}

server:
  servlet:
    context-path: /api

base:
  url: ${BASE_URL}
