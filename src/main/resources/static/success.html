<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Успешная авторизация</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin-top: 80px;
        }
        h1 {
            color: #4CAF50;
        }
        p {
            font-size: 18px;
        }
        .token-box {
            margin-top: 30px;
            text-align: left;
            display: inline-block;
            padding: 20px;
            border: 1px solid #ccc;
            background-color: #fff;
            border-radius: 10px;
            max-width: 90%;
            word-break: break-all;
        }
        code {
            background-color: #eef;
            padding: 4px 6px;
            border-radius: 5px;
            display: block;
            margin-top: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<h1>✅ Авторизация прошла успешно!</h1>
<p>Вы успешно вошли в систему через Google.</p>

<div class="token-box">
    <strong>🔐 Access Token:</strong>
    <code id="access-token">Загрузка...</code>

    <strong>♻️ Refresh Token:</strong>
    <code id="refresh-token">Загрузка...</code>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const accessToken = params.get('accessToken');
    const refreshToken = params.get('refreshToken');

    document.getElementById('access-token').textContent = accessToken || 'Не найден';
    document.getElementById('refresh-token').textContent = refreshToken || 'Не найден';
</script>
</body>
</html>
